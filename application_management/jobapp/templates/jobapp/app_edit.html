{%load static%}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobsNep</title>
    <!-- <link rel="stylesheet" href="{% static 'serv/css/bootstrap.css' %}"> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script async src="https://cdn.jsdelivr.net/npm/es-module-shims@1/dist/es-module-shims.min.js" 
    crossorigin="anonymous"></script>
    <style>
      .errorlist{
        color: red;
        list-style-type: none;
      }
    </style>
</head>
<body>
      <div class="container mt-5">
        <div class="row justify-content-center">
          <div class="col-md-6 col-sm-8 col lg-5 col 2">
            <form method="POST" action="" class="form-control shadow" novalidate>
              <div class="row text-center mt-5">
                <h3 class="text-info">Register</h3>
              </div>
              {% csrf_token %}
              {% for field in form %}
                <div class="row mt-3">
                  <div class="col-12 p-1">
                    {{field.label_tag}}
                  </div>
                  <div class="col-12 p-1">
                    {{field}}
                  </div>
                </div>
                <div class="col-12">
                  <small class="text-danger">
                    {{field.errors|striptags}}
                  </small>
                </div>
            
              {% endfor %}
              <div class="row justify-content-center">
                <div class="d-grid gap-2 my-2 col-sm-8 mx-auto">
                  <button type="submit" class="btn btn-primary">Submit</button>
                </div>
              </div>
              
            </form>
          </div>
        </div>
      </div>
</body>
</html>
